<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team — Ram Kinkar Shahi Memorial Foundation</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div id="site-header"></div>

  <!-- TEAM SECTION -->
  <section class="team" id="team" style="padding-top: 150px;">
    <div class="container">
      <div class="section-eyebrow">Leadership</div>
      <h2 class="section-title">Meet the Directors</h2>
      <p class="section-intro">Committed individuals driving our mission forward with integrity and compassion.</p>
      <div class="team-grid">
        <div class="team-card">
          <div class="team-photo-wrap">
            <img src="./Images/Satish Kumar, Director.jpeg" alt="Satish Kumar, Director" class="team-photo"/>
          </div>
          <div class="team-info">
            <h3 class="team-name">Satish Kumar</h3>
            <span class="team-role">Director</span>
          </div>
        </div>
        <div class="team-card">
          <div class="team-photo-wrap">
            <img src="./Images/Arti Kumari, Director.jpeg" alt="Arti Kumari, Director" class="team-photo"/>
          </div>
          <div class="team-info">
            <h3 class="team-name">Arti Kumari</h3>
            <span class="team-role">Director</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="legal-api.js"></script>
  <script src="include.js"></script>
  <script src="script.js"></script>
</body>
</html>
